name: Apple Build

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          brew install cmake gcc
          brew link gcc

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -G "Unix Makefiles" ..

      - name: Build Nautilus
        run: |
          cd build
          cmake --build .

      - name: Test Nautilus
        run: |
          cd build
          ctest
